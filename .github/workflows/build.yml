name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Compile (Linux)
      if: runner.os == 'Linux'
      run: |
        g++ main.cpp utils/bubbleSort.cpp -o frequencyTable

    - name: Compile (Windows)
      if: runner.os == 'Windows'
      run: |
        g++ main.cpp utils/bubbleSort.cpp -o frequencyTable.exe

    - uses: actions/upload-artifact@v4
      with:
        name: frequencyTable-${{ runner.os }}
        path: |
          frequencyTable*
